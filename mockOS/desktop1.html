<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desktop - 2YAG</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        .font-regular {
            font-family: 'Inter', sans-serif;
        }
        .font-system {
            font-family: "JetBrains Mono", monospace;
        }
        html, body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            height: 100%;
        }
        body {
            background-image: url("../assets/lightsur.png");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        #signout {
            display: flex;
            font-weight: bold;
            font-size: 20px;
            color: white;
            width: 8%;
            height: 40px;
            background-color: gray;
            border-radius: 12px;
            opacity: 0.6;
            position: fixed;
            bottom: 10px;
            right: 12px;
            transition: opacity 0.4s ease, color 0.6s ease, background-color 0.4s ease;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }
        #taskbar {
            position: absolute;
            width: 80%;
            height: 40px;
            background-color: #d2d2d2;
            border-radius: 12px;
            opacity: 0.6;
            position: fixed;
            bottom: 10px;
            left: 200px;
            transition: opacity 0.4s ease;
        }
        #clock {
            font-weight: bold;
            font-size: 100px;
            position: absolute;
            border-radius: 12px;
            position: fixed;
            bottom: 950px;
            right: 20px;
            color: white;
        }
        #settingicon {
            width: 45px;
            border-radius: 12px;
            height: 45px;
            position: absolute;
            right: 20px;
            opacity: 0.6;
            cursor: pointer;
        }
        #settingicon {
            position: absolute;
            bottom: 12px;
            left: 220px;
            width: 35px;
            height: 35px;
            transition: width 0.3s ease, height 0.3s ease, bottom 0.5s ease, opacity 0.5s ease;
            opacity: 0.6;
        }
        .areyouSure {
            position: absolute;
            width: 300px;
            height: 150px;
            background-color: #ffffff;
            border-radius: 17px;
            color: rgb(40, 110, 235);
            opacity: 0;
            transition: opacity 0.4s ease;
        }
        #ARSmessage {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 16px;
            transition: opacity 0.4s ease;
        }
        #yesyes {
            position: absolute;
            top: 90px;
            left: 40px;
            width: 100px;
            height: 50px;
            font-size: 15px;
            color: rgb(40, 110, 235);
            border-radius: 14px;
            border: 1px solid gray;
            transition: opacity 0.4s ease;
        }
        #cancelbtn {
            position: absolute;
            top: 90px;
            right: 40px;
            width: 100px;
            height: 50px;
            font-size: 15px;
            color: rgb(40, 110, 235);
            border-radius: 14px;
            border: 1px solid gray;
            transition: opacity 0.4s ease;
        }
        #signoutBG {
            position: absolute;
            width: 100%;
            height: 100%;
            opacity: 0;
            background-color: black;
            transition: opacity 0.4s ease;
        }
        .areyouSure, #signoutBG, #cancelbtn, #yesyes, #ARSmessage, #transition, #loadingicon {
            pointer-events: none;
        }
        @keyframes rotate {
	        from {transform: rotate(0deg);}
	        to {transform: rotate(360deg);}
        }
        #transition {
	        background-color: black;
	        position: fixed;
	        top: 0;
	        left: 0;
	        width: 100%;
	        height: 100%;
	        opacity: 0;
	        transition: opacity 1s ease;
	        pointer-events: none;
        }
        #loadingicon {
	        position: absolute;
	        width: 200px;
	        height: 200px;
	        top: 460px;
	        left: 855px;
	        transform: translate(-50%, -50%);
	        animation: rotate 4s linear infinite;
	        transition: opacity 0.4s ease;
	        opacity: 0;
        }
        #loadinFade {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: black;
            opacity: 1;
            transition: opacity 0.5s ease;
            z-index: 9999;
            pointer-events: none;
        }
    </style>
</head>
    <body>
        <div id="loadinFade"></div>
        <div id="signout" class="font-regular">Sign Out</div>
        <div id="taskbar"></div>
        <img id="settingicon" src="../assets/settingsreg.jpg">
        <div id="clock" class="font-regular"></div>

        <div id="signoutBG"></div>

        <div class="areyouSure" id="areyouS">
            <p id="ARSmessage" class="font-regular">Are you sure you want to sign out?</p>
            <button id="yesyes">Continue</button>
            <button id="cancelbtn">Cancel</button>
        </div>
        <div id="transition"></div>
        <img src ="../assets/loadingcat.PNG" id="loadingicon">

        <script>
            const signoutLabel = document.getElementById("signout")
            const taskbar = document.getElementById("taskbar")
            const settingicon = document.getElementById("settingicon")

            const signoutbackground = document.getElementById("signoutBG")
            const sureDIV = document.getElementById("areyouS")
            const cancelbutton = document.getElementById("cancelbtn")
            const yes = document.getElementById("yesyes")
            const ARSmsg = document.getElementById("ARSmessage")

            const transition = document.getElementById("transition")
            const loadingicon = document.getElementById("loadingicon")
            window.addEventListener("load", () => {
                document.getElementById("transition").style.opacity = 0;
            });
            function updateClock() {
                const now = new Date();
                let hours = now.getHours();
                const minutes = now.getMinutes();
                hours = hours % 12;
                hours = hours ? hours : 12; 
                const minutesStr = minutes.toString().padStart(2, '0');
                document.getElementById('clock').textContent = `${hours}:${minutesStr}`;
            }
            updateClock(); 
            setInterval(updateClock, 1000);
            function wait(ms) {
	            return new Promise(resolve => setTimeout(resolve, ms));
            }
            const transitionOUT = () => {
	            document.getElementById("transition").style.opacity = "1";
	            document.getElementById("loadingicon").style.opacity = "1";
	            wait(1500).then(() => {
		            document.getElementById("loadingicon").style.opacity = "0";
		            wait(2000).then(() => {
			            window.location.href = "index.html";
	            });
            });
            };
            function showsignLabels() {
                sureDIV.style.opacity = 1;
                signoutbackground.style.opacity = 0.5;
                sureDIV.style.pointerEvents = "auto";
                signoutbackground.style.pointerEvents = "auto";
            }
            function hidesignLabels() {
                sureDIV.style.opacity = "0";
                signoutbackground.style.opacity = "0";
                sureDIV.style.pointerEvents = "none";
                signoutbackground.style.pointerEvents = "none";
            }
            signoutLabel.addEventListener("click", function() {
               showsignLabels();
               yes.style.pointerEvents = "auto";
               cancelbutton.style.pointerEvents = "auto";
            });
            cancelbutton.addEventListener("click", function() {
                hidesignLabels();
                cancelbutton.style.pointerEvents = "none";
                yes.style.pointerEvents = "none";
            });
            yes.addEventListener("click", function() {
                hidesignLabels();
                transitionOUT();
            });
            taskbar.addEventListener("mouseover", function() {
                taskbar.style.opacity = 1;
                settingicon.style.opacity = 1;
                settingicon.style.bottom = "18px";
            });
            taskbar.addEventListener("mouseout", function() {
                taskbar.style.opacity = 0.6;
                settingicon.style.opacity = 1;
                settingicon.style.bottom = "12px";
            });
            settingicon.addEventListener("mouseover", function() {
                taskbar.style.opacity = 1;
                settingicon.style.opacity = 1;
                settingicon.style.bottom = "18px";
            });
            settingicon.addEventListener("mouseout", function() {
                taskbar.style.opacity = 0.6;
                settingicon.style.opacity = 1;
                settingicon.style.bottom = "12px";
            });

            signoutLabel.addEventListener("mouseover", function() {
                signoutLabel.style.backgroundColor = "white";
                signoutLabel.style.color = "black"
                signoutLabel.style.opacity = 1;
            });
            signoutLabel.addEventListener("mouseout", function() {
                signoutLabel.style.backgroundColor = "gray";
                signoutLabel.style.color = "white";
                signoutLabel.style.opacity = 0.6;
            });
            
        </script>
    </body>
</html>
