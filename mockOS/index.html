<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - 2YAG</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <style>
    .font-regular {
      font-family: 'Inter', sans-serif;
    }
    .font-system {
      font-family: "JetBrains Mono", monospace;
    }
    html, body {
        margin: 0;
        padding: 0;
        overflow: hidden;
        height: 100%;
    }
    body {
        background-image: url("../assets/3840x2160.jpg");
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
    }
    @keyframes fadeIn {
      from {opacity: 0;}
      to {opacity: 1;}
    }
    @keyframes fadeOut {
      from {opacity: 1;}
      to {opacity: 0;}
    }
    @keyframes rotate {
      from {transform: rotate(0deg);}
      to {transform: rotate(360deg);}
    }
    .loginform {
      background-color:antiquewhite;
      width: 300px;
      height: 200px;
      border-radius: 20px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      size-adjust: 100px;
      gap: 15px;
      animation: fadeIn 1s ease forwards;
    }
    #thankmsg {
      display: flex;
      flex-direction: column;
      justify-content: center;
      color: whitesmoke;
      opacity: 0;
      transition: opacity 0.4s ease;
      pointer-events: none;
      margin-bottom: -10px;
      margin-top: -13px;
    }
    #errormsg {
      position: absolute;
      background-color: white;
      width: 350px;
      height: 100px;
      top: 50%;
      left: 50%;
      border-radius: 16px;
      display: flex;
      justify-content: center;
      align-items: center;
      transform: translate(-50%, -50%);
      opacity: 0;
      transition: opacity 0.4s ease;
      pointer-events: none;
      flex-direction: column;
      gap: 10px;
      height: 100px;
      box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.5);
    }
    #errortext {
      margin: 0;
      color: rgb(40, 110, 235);
    }
    #errorbg {
      opacity: 0.5;
      background-color: black;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      
      opacity: 0;
      transition: opacity 0.4s ease;
      pointer-events: none;
    }
    #okayprompt {
      background-color: white;
      border: 1px solid gray;
      border-radius: 8px;
      color: rgb(40, 110, 235);
      width: 100px;
      height: 30px;
    }
    #clock {
      position: flex;
      font-weight: bold;
      font-size: 150px;
      color: white;
      animation: fadeIn 1s ease forwards;
      
    }
    .loginform #userinput {
      width: 270px;
      height: 25px;
      border-radius: 10px;
      border: 1px solid gray;
      background-color: beige;
      font-size: 15px;
    }
    .loginform #passinput {
      width: 270px;
      height: 25px;
      border-radius: 10px;
      border: 1px solid gray;
      background-color: beige;
      font-size: 15px;
      
      
    }
    .loginform #enterbutton {
      margin-top: 40px;
      width: 100px;
      height: 40px;
      border-radius: 12px;
      border: 1px solid gray;
      background-color: beige;
      font-size: 15px;
      font-weight: thin;
      color: rgb(115, 115, 115);

    }
    #notice {
      display: flex;
      flex-direction: column;
      justify-content: center;
      color: whitesmoke;
      
      opacity: 0;
      transition: opacity 0.4s ease;
      pointer-events: none;
    }
    #transition {
      background-color: black;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      
      opacity: 0;
      transition: opacity 1s ease;
      pointer-events: none;
    }
    #title1 {
      position: absolute;
      top: -40px;
      left: 880px;
      font-size: 50px;
      color: white;
      font-weight: bold;
      opacity: 0;
      transition: opacity 0.4s ease;
      
    }    
    #title2 {
      position: absolute;
      top: -40px;
      left: 860px;
      font-size: 50px;
      color: white;
      font-weight: bold;
      opacity: 1;
      transition: opacity 0.4s ease;
      
    }
    #loadingicon {
      position: absolute;
      width: 200px;
      height: 200px;
      top: 460px;
      left: 855px;
      transform: translate(-50%, -50%);
      animation: rotate 4s linear infinite;
      transition: opacity 0.4s ease;
      opacity: 0;
    }
    #cat1 {
     position: absolute;
      width: 1000px;
      height: 1000px;
      top: 100px;
      left: 1050px;
      filter: drop-shadow(0px 0px 200px rgba(191, 0, 255, 0.5));
      transition: opacity 0.4s ease;
      opacity: 0;
    }
    #cat2 {
      position: absolute;
      width: 1000px;
      height: 1000px;
      top: 100px;
      left: -250px;
      filter: drop-shadow(200px 200px 200px rgba(230, 0, 255, 0.5));
      transition: opacity 0.4s ease;
      opacity: 0;
    }
    #cat1, #cat2, #loadingicon, #title1, #title2 {
      pointer-events: none;
    }
  </style>
</head>
    
<body>
  <img src="../assets/cat1.PNG" id="cat1">
  <img src="../assets/cat2.PNG" id="cat2">
  <p id="title1" class="font-regular">CatOS</p>
  <p id="title2" class="font-regular">MockOS</p>
  <div id="clock" class="font-regular"></div>
 <p id="thankmsg" class="font-regular">(happy 2 year anniversary!)</p>
 <p id="notice" class="font-regular">(please re-enter your password and username!!! i love you!!)</p>
  <div class="loginform">
    <input type="text" class="font-regular" id="userinput" placeholder=" username..."> 
    <input type="password" class="font-regular" id="passinput" placeholder=" password...">
    <button id="enterbutton" class="font-regular">Log In</button>
  </div>
  <div id="errorbg"></div>
  <div id="errormsg">
    <p id="errortext" class="font-regular">Wrong Username or Password!</p>
    <button id="okayprompt" class="font-regular">Okay</button>
  </div>
  <div id="transition"></div>
  <img src ="../assets/loadingcat.PNG" id="loadingicon">
  <script>
    const enterButton = document.getElementById("enterbutton")
    const userInput = document.getElementById("userinput")
    const passInput = document.getElementById("passinput")
    const errorBG = document.getElementById("errorbg")
    const errorMSG = document.getElementById("errormsg")
    const okayButton = document.getElementById("okayprompt");
    function wait(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }
    const transitionpage1 = () => {
      document.getElementById("transition").style.opacity = "1";
      document.getElementById("loadingicon").style.opacity = "1";
      wait(1500).then(() => {
        document.getElementById("loadingicon").style.opacity = "0";
        wait(2000).then(() => {
          window.location.href = "../root/desktop2.html";
      });
    });
    };
    const transitionpage2 = () => {
      document.getElementById("transition").style.opacity = "1";
      document.getElementById("loadingicon").style.opacity = "1";
      wait(1500).then(() => {
        document.getElementById("loadingicon").style.opacity = "0";
        wait(2000).then(() => {
          window.location.href = "../root/desktop1.html";
      });
    });
    };
    let ismcat = false;
    enterButton.addEventListener("click", function() {
      const mcatcred = (
      userInput.value === "McatAftonGacha" && passInput.value === "elenapower6"
      )
      const regularuser = (
        userInput.value === "username123" && passInput.value === "password123"
      )
      if (ismcat) {
        if (mcatcred) {
          transitionpage1();
        } else {
          errorBG.style.opacity = "0.5";
          errorMSG.style.opacity = "1";
          errorBG.style.pointerEvents = "auto";
          errorMSG.style.pointerEvents = "auto";
        }
      }
      else if (regularuser) {
        transitionpage2();
      } else if (mcatcred) {
        ismcat = true;
        document.getElementById("thankmsg").style.opacity = "1";
        document.getElementById("notice").style.opacity = "1";
        document.getElementById("cat1").style.opacity = "1";
        document.getElementById("cat2").style.opacity = "1";
        document.getElementById("title1").style.opacity = "1";
        document.getElementById("title2").style.opacity = "0";
        document.getElementById("userinput").value = "";
        document.getElementById("passinput").value = "";
      } else {
          errorBG.style.opacity = "0.5";
          errorMSG.style.opacity = "1";
          errorBG.style.pointerEvents = "auto";
          errorMSG.style.pointerEvents = "auto";
      }
    });

    enterButton.addEventListener("mouseover", function() {
      enterButton.style.backgroundColor = "rgb(201, 201, 201)";
    });
    enterButton.addEventListener("mouseout", function() {
      enterButton.style.backgroundColor = "white";
    });
    okayButton.addEventListener("mouseover", function() {
      okayButton.style.backgroundColor = "rgb(201, 201, 201)";
    });
    okayButton.addEventListener("mouseout", function() {
      okayButton.style.backgroundColor = "white";
    }); 
    okayButton.addEventListener("click", function() {
      errorBG.style.opacity = "0";
      errorMSG.style.opacity = "0";
      errorBG.style.pointerEvents = "none";
      errorMSG.style.pointerEvents = "none";
    });
    function updateClock() {
      const now = new Date();
      let hours = now.getHours();
      const minutes = now.getMinutes();
      hours = hours % 12;
      hours = hours ? hours : 12; 
      const minutesStr = minutes.toString().padStart(2, '0');
      document.getElementById('clock').textContent = `${hours}:${minutesStr}`;
    }
    updateClock(); 
    setInterval(updateClock, 1000);
  </script>
</body>
</html>
