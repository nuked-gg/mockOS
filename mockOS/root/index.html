<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Login - 2YAG</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

  <style>

    .font-regular {
      font-family: 'Inter', sans-serif;
    }

    .font-system {
      font-family: "JetBrains Mono", monospace;
    }

    html, body {
        margin: 0;
        padding: 0;
        overflow: hidden;
        height: 100%;
    }

    body {
        background-image: url("../assets/3840x2160.jpg");
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        display: flex;
        flex-direction: column;

        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
    }

    @keyframes fadeIn {
      from {opacity: 0;}
      to {opacity: 1;}
    }

    .loginform {
      background-color:antiquewhite;
      width: 300px;
      height: 200px;
      border-radius: 20px;
      
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      size-adjust: 100px;
      gap: 15px;
      animation: fadeIn 1s ease forwards;
    }

    #thankmsg {
      display: flex;
      flex-direction: column;
      justify-content: center;
      animation: fadeIn 1.5s ease forwards;
      color: whitesmoke;
    }

    #errormsg {
      position: absolute;
      background-color: white;
      width: 300px;
      height: 70px;
      top: 50%;
      left: 50%;
      border-radius: 16px;

      display: flex;
      justify-content: center;
      align-items: center;
      transform: translate(-50%, -50%);

      opacity: 0;
      transition: opacity 0.4s ease;
      pointer-events: none;

      flex-direction: column;
      gap: 10px;
      height: 100px;
      border: 1px gray;
    }

    #errortext {
      margin: 0;
      color: rgb(40, 110, 235);
    }

    #errorbg {
      opacity: 0.5;
      background-color: black;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      
      opacity: 0;
      transition: opacity 0.4s ease;
      pointer-events: none;
    }

    #okayprompt {
      background-color: white;
      border: 1px solid gray;
      border-radius: 8px;
    }

    #clock {
      position: flex;
      font-weight: bold;
      font-size: 150px;
      color: white;
      animation: fadeIn 1s ease forwards;
      
    }

    .loginform #userinput {
      width: 270px;
      height: 25px;
      border-radius: 10px;
      border: 1px solid gray;
      background-color: beige;
      font-size: 15px;
    }
    
    .loginform #passinput {
      width: 270px;
      height: 25px;
      border-radius: 10px;
      border: 1px solid gray;
      background-color: beige;
      font-size: 15px;
      
      
    }

    .loginform #enterbutton {
      margin-top: 40px;
      width: 100px;
      height: 40px;
      border-radius: 8px;
      border: 1px solid gray;
      background-color: beige;
      font-size: 15px;

    }

  </style>

</head>
    
<body>

  <div id="clock" class="font-regular"></div>

 
 <p id="thankmsg" class="font-regular">(happy 2 year anniversary!)</p>

  

  <div class="loginform">

    <input type="text" class="font-regular" id="userinput" placeholder="username..."> 
    <input type="password" class="font-regular" id="passinput" placeholder="password...">

    <button id="enterbutton" class="font-regular">Log In</button>

  </div>

  <div id="errorbg"></div>

  <div id="errormsg">
    <p id="errortext" class="font-regular">Wrong Username or Password!</p>
    <button id="okayprompt" class="font-regular">Okay</button>
  </div>

  

  <script>
    const enterButton = document.getElementById("enterbutton")
    const userInput = document.getElementById("userinput")
    const passInput = document.getElementById("passinput")
    const errorBG = document.getElementById("errorbg")
    const errorMSG = document.getElementById("errormsg")
    const okayButton = document.getElementById("okayprompt");

    enterButton.addEventListener("click", function() {
      if (userInput.value !== "McatAftonGacha" || passInput.value !== "elenapower6") {

        errorBG.style.opacity = "0.5";
        errorMSG.style.opacity = "1";
        errorBG.style.pointerEvents = "auto";
        errorMSG.style.pointerEvents = "auto";

      } else {

      }
    });

    okayButton.addEventListener("click", function() {

    errorBG.style.opacity = "0";
    errorMSG.style.opacity = "0";
    errorBG.style.pointerEvents = "none";
    errorMSG.style.pointerEvents = "none";

    });

    function updateClock() {
      const now = new Date();
      let hours = now.getHours();
      const minutes = now.getMinutes();

      hours = hours % 12;
      hours = hours ? hours : 12; 

      const minutesStr = minutes.toString().padStart(2, '0');

      document.getElementById('clock').textContent = `${hours}:${minutesStr}`;
    }

    updateClock(); 
    setInterval(updateClock, 1000);

  </script>

</body>

</html>
