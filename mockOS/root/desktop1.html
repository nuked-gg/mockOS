<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desktop - 2YAG</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        .font-regular {
            font-family: 'Inter', sans-serif;
        }
        .font-system {
            font-family: "JetBrains Mono", monospace;
        }
        html, body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            height: 100%;
        }
        body {
            background-image: url("../assets/lightsur.png");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        #signout {
            display: flex;
            font-weight: bold;
            font-size: 20px;
            color: white;
            width: 8%;
            height: 40px;
            background-color: gray;
            border-radius: 12px;
            opacity: 0.6;
            position: fixed;
            bottom: 10px;
            right: 12px;
            transition: opacity 0.4s ease, color 0.6s ease, background-color 0.4s ease;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }
        #taskbar {
            position: absolute;
            width: 80%;
            height: 40px;
            background-color: #d2d2d2;
            border-radius: 12px;
            opacity: 0.6;
            position: fixed;
            bottom: 10px;
            left: 200px;
            transition: opacity 0.4s ease;
        }
        #clock {
            font-weight: bold;
            font-size: 100px;
            position: absolute;
            border-radius: 12px;
            position: fixed;
            bottom: 950px;
            right: 20px;
            color: white;
        }
        #settingicon {
            width: 45px;
            border-radius: 12px;
            height: 45px;
            position: absolute;
            right: 20px;
            opacity: 0.6;
            cursor: pointer;
        }
        #settingicon {
            position: absolute;
            bottom: 12px;
            left: 220px;
            width: 35px;
            height: 35px;
            transition: width 0.3s ease, height 0.3s ease, bottom 0.5s ease, opacity 0.5s ease;
            opacity: 0.6;
        }
        .areyouSure {
            position: absolute;
            width: 300px;
            height: 150px;
            background-color: #ffffff;
            border-radius: 17px;
            color: rgb(40, 110, 235);
        }
        #ARSmessage {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 16px;
        }
        #yesyes {
            position: absolute;
            top: 90px;
            left: 40px;
            width: 100px;
            height: 50px;
            font-size: 15px;
            color: rgb(40, 110, 235);
            border-radius: 14px;
            border: 1px solid gray;
        }
        #cancelbtn {
            position: absolute;
            top: 90px;
            right: 40px;
            width: 100px;
            height: 50px;
            font-size: 15px;
            color: rgb(40, 110, 235);
            border-radius: 14px;
            border: 1px solid gray; 
        }
        #signoutBG {
            position: absolute;
            width: 100%;
            height: 100%;
            opacity: 0.5;
            background-color: black;
        }
    </style>
</head>
    <body>
        <div id="signout" class="font-regular">Sign Out</div>
        <div id="taskbar"></div>
        <img id="settingicon" src="../assets/settingsreg.jpg">
        <div id="clock" class="font-regular"></div>
        <div id="signoutBG"></div>
        <div class="areyouSure">
            <p id="ARSmessage" class="font-regular">Are you sure you want to sign out?</p>
            <button id="yesyes">Continue</button>
            <button id="cancelbtn">Cancel</button>
        </div>
        <script>
            const signoutLabel = document.getElementById("signout")
            const taskbar = document.getElementById("taskbar")
            const settingicon = document.getElementById("settingicon")
            function updateClock() {
                const now = new Date();
                let hours = now.getHours();
                const minutes = now.getMinutes();
                hours = hours % 12;
                hours = hours ? hours : 12; 
                const minutesStr = minutes.toString().padStart(2, '0');
                document.getElementById('clock').textContent = `${hours}:${minutesStr}`;
            }
            updateClock(); 
            setInterval(updateClock, 1000);
            taskbar.addEventListener("mouseover", function() {
                taskbar.style.opacity = 1;
                settingicon.style.opacity = 1;
                settingicon.style.bottom = "18px";
            });
            taskbar.addEventListener("mouseout", function() {
                taskbar.style.opacity = 0.6;
                settingicon.style.opacity = 1;
                settingicon.style.bottom = "12px";
            });
            settingicon.addEventListener("mouseover", function() {
                taskbar.style.opacity = 1;
                settingicon.style.opacity = 1;
                settingicon.style.bottom = "18px";
            });
            settingicon.addEventListener("mouseout", function() {
                taskbar.style.opacity = 0.6;
                settingicon.style.opacity = 1;
                settingicon.style.bottom = "12px";
            });

            signoutLabel.addEventListener("mouseover", function() {
                signoutLabel.style.backgroundColor = "white";
                signoutLabel.style.color = "black"
                signoutLabel.style.opacity = 1;
            });
            signoutLabel.addEventListener("mouseout", function() {
                signoutLabel.style.backgroundColor = "gray";
                signoutLabel.style.color = "white";
                signoutLabel.style.opacity = 0.6;
            });
        </script>
    </body>
</html>
